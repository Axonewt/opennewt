name: Axonewt CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio ruff

      - name: Lint with ruff
        run: |
          ruff check src/

      - name: Type check (mypy)
        run: |
          pip install mypy
          mypy src/ --ignore-missing-imports || true

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short || true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t axonewt:test .

      - name: Test Docker startup
        run: |
          docker run -d --name axonewt-test axonewt:test
          sleep 5
          docker logs axonewt-test
          docker stop axonewt-test

  api-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Start API server
        run: |
          timeout 10 python api_server.py --port 5055 &
          sleep 5

      - name: Test API endpoints
        run: |
          curl -s http://localhost:5055/health | grep -q "ok" && echo "✅ /health OK" || echo "❌ /health FAIL"
          curl -s http://localhost:5055/api/status | grep -q "version" && echo "✅ /api/status OK" || echo "❌ /api/status FAIL"
